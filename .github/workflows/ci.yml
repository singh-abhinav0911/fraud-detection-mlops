name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4        # v3 → v4

    - name: Set up Python
      uses: actions/setup-python@v5    # v4 → v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements-docker.txt

    - name: Test API import
      run: |
        cd src
        python -c "from app import app; print('API imports OK')"

    - name: Build Docker image
      run: docker build -t fraud-detection-api .